<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Isaac Clicker</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="assets/icons/icon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header-banner text-white text-center">
  <h1>Isaac Clicker</h1>
</header>

<main class="container text-center mt-3 main-content">

  <p class="lead">
    Haz clic en los enemigos para eliminarlos. ¡Aparecerán en otra zona!
  </p>

  <h3 class="mb-3">
    Eliminados: <span id="contador">0</span>
  </h3>

  <canvas id="gameCanvas" width="1350" height="620"></canvas>

</main>

<footer class="footer-banner text-white text-center">
  <p class="mb-1">Martin Cruz Alvarez - ISC</p>
</footer>

<!-- AUDIO -->
<audio id="bgMusic" loop preload="auto">
  <source src="assets/audio/music.ogg" type="audio/ogg">
</audio>

<script src="script.js"></script>

</body>
</html>
